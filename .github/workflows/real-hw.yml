name: Real-Hardware CI

# Snapdragon X-series ARM64 self-hosted runner workflow.
#
# Triggers:
#   - Manual (workflow_dispatch) for ad-hoc validation
#   - Nightly cron at 03:00 UTC so trunk health is tracked daily
#   - PR label "needs:real-hw" — to gate sensitive merges
#
# Runner setup: see docs/REAL_HARDWARE_CI.md.
# Required env (set as repository secrets / variables):
#   - QAIRT_TEST_ARCHIVE: path on the runner to a pre-staged QAIRT zip
#     (so we don't re-download a 1.7 GB archive every run)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * *"
  pull_request:
    types: [labeled, synchronize]

jobs:
  e2e:
    name: e2e on Snapdragon X
    if: >-
      github.event_name == 'workflow_dispatch'
      || github.event_name == 'schedule'
      || (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'needs:real-hw'))
    runs-on: [self-hosted, snapdragon-x, windows]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install QUAD with real extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,real]

      - name: Run mock-mode unit tests (sanity)
        env:
          QUAD_ADAPTER_MODE: mock
          PYTHONIOENCODING: utf-8
        run: pytest -q --tb=short --ignore=tests/e2e

      - name: Run e2e against real QAIRT SDK
        env:
          QUAD_TEST_QAIRT_ARCHIVE: ${{ vars.QAIRT_TEST_ARCHIVE }}
          PYTHONIOENCODING: utf-8
        run: pytest tests/e2e/test_real_sdk_e2e.py -v -s --tb=short

      - name: Run real-mode hardware detection
        env:
          QUAD_ADAPTER_MODE: real
          PYTHONIOENCODING: utf-8
        run: |
          python -c "
          import asyncio
          from quad.config import load_config
          from quad.adapters.factory import AdapterFactory
          factory = AdapterFactory(load_config(), strict=True)
          adapter = factory.get_adapter('auto')
          profile = asyncio.run(adapter.detect_hardware('windows'))
          print(profile.model_dump_json(indent=2))
          "
