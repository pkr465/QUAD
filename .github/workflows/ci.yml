name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        # Trim a few combinations to keep the matrix fast — we still
        # cover both OSes on the version we lint with.
        exclude:
          - os: windows-latest
            python-version: "3.10"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ubuntu, 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/

      - name: Type check (ubuntu, 3.11 only)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: |
          mypy src/ --ignore-missing-imports

      - name: Test
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          pytest tests/ --cov=quad --cov-report=xml --cov-report=term-missing

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  package:
    name: Package dry-run (sdist + wheel)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel --sdist

      - name: Verify wheel ships templates
        run: |
          python -m zipfile -l dist/*.whl > wheel_contents.txt
          grep -q "quad/templates/qnn/inference_bin.cpp.j2" wheel_contents.txt
          grep -q "quad/templates/snpe/" wheel_contents.txt

      - name: Verify sdist ships scripts + templates
        run: |
          python -m tarfile -l dist/*.tar.gz > sdist_contents.txt
          grep -q "templates/qnn/" sdist_contents.txt
          grep -q "install.sh" sdist_contents.txt
          grep -q "scripts/setup_sdk.sh" sdist_contents.txt

      - name: Smoke-install wheel into a clean venv
        run: |
          python -m venv .smoke
          .smoke/bin/python -m pip install --upgrade pip
          .smoke/bin/pip install dist/*.whl
          # Verify both entry points are reachable and the CLI runs
          .smoke/bin/quad-server --help || true
          QUAD_ADAPTER_MODE=mock .smoke/bin/python -m quad.cli.main mode

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
